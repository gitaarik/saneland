# hyprpaper — static per-theme wallpaper daemon.
#
# Replaces Hyprland's built-in renderer, which (with no wallpaper daemon
# running) picks one of its bundled defaults at random on every launch.
#
# This config deliberately sets NO wallpaper: hyprpaper 0.8.4 (the hyprtoolkit
# rewrite) ignores the `wallpaper =`/`preload` directives here and never paints
# at startup. The wallpaper is applied instead via `hyprctl hyprpaper wallpaper`
# by ~/.local/bin/hypr-wallpaper — run from hyprland.conf's exec-once at boot,
# and by ~/.local/bin/theme on every dark/light switch. See that helper for the
# full story. All we need from this file is IPC turned on.

ipc = on
splash = false
