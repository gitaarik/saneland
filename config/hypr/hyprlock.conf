# ~/.config/hypr/hyprlock.conf
#
# Minimal lock screen — blurred screenshot background, clock, password input.

general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
}

# Blurred screenshot of whatever was on screen when locked.
# Swap `path = screenshot` for a wallpaper file (e.g. theme/dark/wallpaper.jpg)
# if you want a fixed lock image.
background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

# Clock — large HH:MM.
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(235, 219, 178, 1.0)
    font_size = 64
    font_family = Noto Sans
    position = 0, 100
    halign = center
    valign = center
}

# Date — small, under the clock.
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(235, 219, 178, 0.8)
    font_size = 18
    font_family = Noto Sans
    position = 0, 40
    halign = center
    valign = center
}

# Password input — single line, dots.
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    outer_color = rgba(40, 40, 40, 0.9)
    inner_color = rgba(60, 56, 54, 0.6)
    font_color = rgb(235, 219, 178)
    fade_on_empty = false
    placeholder_text = <i>Password</i>
    position = 0, -100
    halign = center
    valign = center
}
