# ~/.config/hypr/hyprland.conf
#
# Main Hyprland config: monitors, autostart, input, gaps, keybinds, window rules.
# Companion files: hypridle.conf (idle/lock policy), hyprlock.conf (lock screen).

# ----------------------------------------------------------------------------
# Monitors
# ----------------------------------------------------------------------------
# Format: monitor=NAME,RESOLUTION@REFRESH,POSITION,SCALE
# Use `hyprctl monitors` to discover names/modes.
# eDP-1 native: 2256x1504. Scale 1.5666667 is Hyprland's exact suggested
# fractional scale for this panel (yields 1440x960 effective — clean integer
# pixel count). Using 1.5 is rejected on fresh session start ("Invalid scale
# passed to monitor"); hyprctl reload was lenient about it mid-session but
# fresh boots enforce the rule, leaving gaps where the splash shows through.
# XWayland apps will look slightly fuzzy at fractional scale; X11 limitation.
#
# Order: wildcard first, specific second — specific overrides wildcard.

monitor = , preferred, auto, 1
monitor = eDP-1, 2256x1504@60, 0x0, 1.5666667

# ----------------------------------------------------------------------------
# Autostart
# ----------------------------------------------------------------------------
# Lean by design — the eww bar handles the tray/system-status surface (network,
# bluetooth, volume, battery, clock) so no separate applets are needed. Screen
# color temp via hyprsunset; idle/lock via hypridle+hyprlock; screenshots via
# grim+slurp (keybind further down).

exec-once = hypridle
exec-once = hyprpaper                            # wallpaper daemon (IPC only; see hyprpaper.conf)
exec-once = ~/.local/bin/hypr-wallpaper-rotate   # rotate the current theme's wallpaper pool on a timer
# LC_TIME=en_GB.UTF-8: GtkCalendar reads first-day-of-week from the locale's
# first_weekday; en_GB gives Monday-first while keeping English day/month
# names. Needs the locale generated: uncomment en_GB.UTF-8 in
# /etc/locale.gen and run `sudo locale-gen`.
exec-once = LC_TIME=en_GB.UTF-8 eww daemon
exec-once = sleep 0.5 && eww open bar
exec-once = swaync
exec-once = ~/.local/bin/hypr-battery-monitor   # notify (swaync) on low battery (20% / 10%)
exec-once = hyprsunset -t 4500
exec-once = ~/.local/bin/hypr-raise-focused   # raise focused window to top of floating z-order
exec-once = ~/.local/bin/hypr-max-on-open     # resize new non-dialog windows to work area
exec-once = ~/.local/bin/hypr-window-order    # track window creation order (for mod+Tab cycle)
exec-once = ~/.local/bin/hypr-alttab-daemon   # MRU window stack for ALT+Tab
# Add your own tray-less autostarts here, e.g.:
# exec-once = syncthingtray-qt6 --wait

# ----------------------------------------------------------------------------
# Input
# ----------------------------------------------------------------------------
cursor {
    no_warps = true   # don't warp the mouse on focus changes (e.g. taskbar clicks)
}

input {
    kb_layout = us
    kb_variant = altgr-intl             # AltGr dead keys: AltGr+' then e → é, etc.
    kb_options = ctrl:nocaps            # Caps Lock acts as Ctrl
    follow_mouse = 0          # click-to-focus (no focus change on hover)
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
        scroll_factor = 0.5     # slow touchpad scrolling (default 1.0)
    }
}

# ----------------------------------------------------------------------------
# General appearance
# ----------------------------------------------------------------------------
general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(d79921ee)   # placeholder — wire to theme palette later
    col.inactive_border = rgba(3c3836aa)
    layout = master                       # closest in feel to awful fair

    # Border-drag resize (no modifier needed — just grab a window border).
    # NOTE: this is still corner-only, like every resize in Hyprland. The drag
    # picks one of four corners from the cursor's quadrant relative to the
    # window centre (src/layout/supplementary/DragController.cpp, dragBegin) —
    # single-edge resize does not exist (issue #6152 closed not_planned, PR
    # #6571 closed unmerged, confirmed on main as of 0.55.4). The hover cursor
    # may show an edge arrow near an edge midpoint, but the actual drag still
    # resizes a corner. extend_border_grab_area widens the otherwise 2px-thin
    # grab zone so the border is easy to hit.
    resize_on_border = true
    extend_border_grab_area = 8
}

decoration {
    rounding = 4
    blur {
        enabled = true
        size = 4
        passes = 1
    }
    shadow {
        enabled = false
    }
}


animations {
    # Workspace slide stays — that's the only animation we like.
    animation = workspaces, 1, 2, default, slide

    # Everything else off. Under the stacking-first config, every animation
    # on focus change is just visual noise (the resize / fade transitions
    # produce the "flash" between the previous and next maximized window).
    animation = windows, 0
    animation = fadeIn, 0
    animation = fadeOut, 0
    animation = fade, 0
    animation = border, 0
    animation = borderangle, 0
}

binds {
    # Hyprland default is false (fullscreen = locked focus, guard rail against
    # accidentally popping out of a video). Tiled workflow prefers seamless
    # cycling: focus moves AND new window inherits fullscreen state.
    movefocus_cycles_fullscreen = true
}

master {
    new_status = slave
    mfact = 0.55
}

# ----------------------------------------------------------------------------
# Workspaces
# ----------------------------------------------------------------------------
# Global workspaces (Hyprland default) — workspaces follow focus between
# monitors. When you go multi-monitor later, add `kanshi` for declarative
# output profiles instead of pinning workspaces per output.

# ----------------------------------------------------------------------------
# Window rules
# ----------------------------------------------------------------------------
# Workflow: stacking-first DE feel ("Windows-like"). Every window floats by
# default; combined with the maximize rule below, every new window opens
# floating + maximized, so you see one full-screen window at a time and
# switch between them via mod+Tab / taskbar clicks. Per-workspace taskbar
# (eww's taskbar widget) still works regardless of float
# state. The float-everything rule replaces the tiling master layout's
# auto-tile behavior — no tile happens unless you explicitly tile-toggle.
windowrule = float 1, match:class ^(.*)$

# Float-specific small dialogs (already covered by the catch-all above, but
# kept explicit for clarity in case the catch-all is ever scoped back).
windowrule = float 1, match:class ^([Bb]lueman-manager)$
windowrule = float 1, match:class ^(copyq)$
windowrule = float 1, match:class ^(nm-connection-editor)$
windowrule = float 1, match:class ^(pavucontrol)$
windowrule = float 1, match:class ^(pinentry-.*)$
windowrule = float 1, match:class ^(Sxiv)$
windowrule = float 1, match:class ^(Tor Browser)$
windowrule = float 1, match:title ^(Download.*)$         # was Firefox DTA window
windowrule = float 1, match:class ^(.*vnc.*)$

# Sane initial size + center for floating dialogs. XWayland apps that don't
# request a specific size inherit the master-layout slot size (i.e. the full
# work area) when their float rule fires — these explicit sizes restore the
# "small dialog" feel.
windowrule = size 800 600, match:class ^([Bb]lueman-manager)$
windowrule = center 1, match:class ^([Bb]lueman-manager)$
windowrule = size 700 500, match:class ^(pavucontrol)$
windowrule = center 1, match:class ^(pavucontrol)$

# Note: Thunderbird's event-details popups call set_maximized() on
# themselves on Wayland (likely a stale "restore window state" flag).
# We'd block that with `windowrule = suppressevent maximize` but that
# rule type isn't recognised in this Hyprland build. Worked around
# in hypr-max-on-open by dispatching fullscreenstate 0 0 to
# subsequent-of-class windows that opened with fullscreenClient set.

# Stacking-first flow: new windows get sized to the work area WITHOUT
# using the maximize/fullscreen state (Hyprland un-maximizes the previous
# window on every focus change, which flashes during mod+Tab; plain
# size+move via the daemon has no state to swap — just z-order. Smooth).
#
# Sizing is owned by hypr-max-on-open: it watches openwindow events and
# resizes only windows that opened large (likely a main app window),
# leaving popups/dialogs at their requested size. A static
# `size 100% 100%` windowrule used to live here, but it can't tell a
# Thunderbird main window from its event-details popup (same class), so
# the daemon's size heuristic took over. Trade-off: a one-frame visual
# flash on Wayland apps that previously got sized before first paint.
# mod+m still toggles real fullscreen when you want bar-covering.

# Drop the border on maximized-class windows — pure noise around a
# full-screen window. Dialogs still get borders (they're not in this rule's
# match), since the orange border helps identify the focused dialog.
# ----------------------------------------------------------------------------
# Variables
# ----------------------------------------------------------------------------
$mod = SUPER
$term = kitty
$browser = firefox                                  # your browser of choice
$launcher = rofi -show drun
$lock = hyprlock
$shotdir = ~/Pictures/Screenshots

# ----------------------------------------------------------------------------
# Keybinds
# ----------------------------------------------------------------------------
# Translated from rc.lua key_binding_funcs. Intentionally partial — covers the
# daily-driver set; rare binds (menu, snapshot/restore floating) come later.

# Apps
bind = $mod, Return, exec, $term
bind = $mod SHIFT, Return, exec, $browser
bind = $mod, Space, exec, $launcher

# Focus
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, Tab, exec, ~/.local/bin/hypr-cycle-maximize         # cycle next, re-apply maximize
bind = $mod SHIFT, Tab, exec, ~/.local/bin/hypr-cycle-maximize prev
# Snap active window to a half of the work area (Mod+Ctrl+h/j/k/l).
# The focusmonitor binds for h/l previously here are dropped — single
# monitor and we want the snap gesture instead.
bind = $mod CTRL, h, exec, ~/.local/bin/hypr-snap-window left
bind = $mod CTRL, l, exec, ~/.local/bin/hypr-snap-window right
bind = $mod CTRL, k, exec, ~/.local/bin/hypr-snap-window top
bind = $mod CTRL, j, exec, ~/.local/bin/hypr-snap-window bottom

# Reorder the focused window left/right in the taskbar / cycle order
# (manipulates ~/.cache/hypr-window-order, which eww reads).
bind = $mod SHIFT, h, exec, ~/.local/bin/hypr-reorder-window left
bind = $mod SHIFT, l, exec, ~/.local/bin/hypr-reorder-window right

# Window state
# mod+M toggles maximize: first press fills work area, second press restores
# to whatever the window's size+position was right before the first press.
# Per-window memory in /tmp/hypr-window-prev-size.$UID.
bind = $mod, m, exec, ~/.local/bin/hypr-toggle-maximize
# mod+SHIFT+M is real fullscreen (bar-hiding). This DOES use fullscreen state
# and triggers the one-per-workspace rule, which is correct for video etc.
bind = $mod SHIFT, m, fullscreen, 0
bind = $mod, v, togglefloating
bind = $mod, t, pin                                 # was: toggle on-top
bind = $mod, c, exec, ~/.local/bin/hypr-center-window      # resize to ~60% + center + restore border
bind = $mod SHIFT, c, exec, ~/.local/bin/hypr-center-window 80   # same, bigger (~80%)
bind = $mod, i, layoutmsg, cyclenext                # cycle within master layout
bind = CTRL SHIFT, q, killactive

# Alt+Tab — MRU focus history via hypr-alttab-daemon. While Alt is held,
# Tab walks back through previously-focused windows; Shift+Tab walks
# forward. The cycle commits when Alt is physically released: the daemon
# reads the real Alt key off /dev/input (needs the 'input' group — see
# docs/ARCHITECTURE.md), so timing no longer matters. Hyprland's bindr on
# modifier-only Alt_L release doesn't reliably fire in this build, hence
# the evdev approach instead.
bind = ALT,       Tab, exec, ~/.local/bin/hypr-alttab next
bind = ALT SHIFT, Tab, exec, ~/.local/bin/hypr-alttab prev

# Workspaces — 1-4 on the number row, 5-8 on qwer, 9-12 on asdf (two
# left-hand rows reachable without leaving home position).
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, q, workspace, 5
bind = $mod, w, workspace, 6
bind = $mod, e, workspace, 7
bind = $mod, r, workspace, 8
bind = $mod, a, workspace, 9
bind = $mod, s, workspace, 10
bind = $mod, d, workspace, 11
bind = $mod, f, workspace, 12

# Move active window to workspace (focus stays on current workspace)
bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, q, movetoworkspacesilent, 5
bind = $mod SHIFT, w, movetoworkspacesilent, 6
bind = $mod SHIFT, e, movetoworkspacesilent, 7
bind = $mod SHIFT, r, movetoworkspacesilent, 8
bind = $mod SHIFT, a, movetoworkspacesilent, 9
bind = $mod SHIFT, s, movetoworkspacesilent, 10
bind = $mod SHIFT, d, movetoworkspacesilent, 11
bind = $mod SHIFT, f, movetoworkspacesilent, 12

# System
bind = $mod, Escape, exec, $lock
bind = $mod ALT, l, exec, $lock
bind = $mod ALT, q, exit                                          # quit Hyprland (back to the login manager)
bind = $mod ALT, r, exec, hyprctl reload                          # reload hyprland.conf
bind = $mod SHIFT, n, exec, swaync-client -t -sw    # toggle notification panel
bind = ,      XF86PowerOff, exec, ~/.local/bin/hypr-power-menu    # confirm before shutdown (needs HandlePowerKey=ignore in logind.conf)

# Screenshots: hyprshot saves to $shotdir AND copies to clipboard;
# Shift variant pipes raw PNG into satty for annotation before saving.
bind = ,      Print, exec, hyprshot -m region -o $shotdir
bind = SHIFT, Print, exec, hyprshot -m region --raw | satty --filename - --output-dir $shotdir --copy-command wl-copy --early-exit
bind = CTRL,  Print, exec, hyprshot -m output -o $shotdir
bind = ALT,   Print, exec, hyprshot -m window -o $shotdir

# Media keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 1%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = , XF86MonBrightnessUp, exec, ~/.local/bin/brightness-step up
bindel = , XF86MonBrightnessDown, exec, ~/.local/bin/brightness-step down

# ----------------------------------------------------------------------------
# Mouse
# ----------------------------------------------------------------------------
bindm = $mod, mouse:272, movewindow                 # super+left-drag to move
bindm = $mod, mouse:273, resizewindow               # super+right-drag to resize (grab anywhere, no need to aim at the border)
bindm = $mod ALT, mouse:272, resizewindow           # super+alt+left-drag to resize (touchpad-friendly: no right button needed)
# Three ways to resize, all corner-only (Hyprland has no single-edge resize —
# see the note in the general{} block): the two binds above (grab anywhere in
# the window — right-drag, or super+alt+left-drag for touchpads) and
# general:resize_on_border (grab a window border, no modifier).

# ----------------------------------------------------------------------------
# Plugins (hyprpm)
# ----------------------------------------------------------------------------
# hyprbars draws a per-window title bar with clickable buttons — a mouse/
# touchpad-friendly way to close a window without the keyboard (complements the
# CTRL SHIFT q killactive bind). It's a COMPILED plugin pinned to the Hyprland
# ABI: after every `hyprland` package upgrade it must be rebuilt or it silently
# fails to load. See docs/ARCHITECTURE.md ("hyprbars") for the rebuild step. One-time
# install:
#     hyprpm update
#     hyprpm add https://github.com/hyprwm/hyprland-plugins
#     hyprpm enable hyprbars
# `hyprpm reload` loads all enabled plugins at login.
exec-once = hyprpm reload -n

plugin {
    hyprbars {
        bar_height = 24
        bar_color = rgb(282828)               # gruvbox bg
        col.text = rgb(ebdbb2)                # gruvbox fg
        bar_text_size = 11
        bar_text_font = JetBrainsMono Nerd Font
        bar_button_padding = 8
        bar_padding = 10
        bar_precedence_over_border = true     # bar sits above the window border
        on_double_click = ~/.local/bin/hypr-toggle-maximize  # same as mod+m / the maximize button

        # hyprbars-button = color, size, glyph, on-click dispatch
        # Buttons render right-to-left, so close (red) ends up rightmost.
        hyprbars-button = rgb(cc241d), 13, , hyprctl dispatch killactive    # close
        hyprbars-button = rgb(d79921), 13, , ~/.local/bin/hypr-toggle-maximize  # same as mod+m
    }
}

# ----------------------------------------------------------------------------
# Debug
# ----------------------------------------------------------------------------
# Logs to ~/.local/share/hyprland/hyprland.log (and /tmp/hypr/<instance>/...).
# Tail after a stuck session to find why input didn't bind.
debug {
    disable_logs = false
}
