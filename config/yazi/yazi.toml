# Yazi configuration
# https://yazi-rs.github.io/docs/configuration/yazi

[mgr]
# Show hidden files by default
show_hidden = true

# Sort directories first
sort_dir_first = true

# Ratio: parent:current:preview (default 1:4:3)
ratio = [1, 4, 3]

[preview]
max_width = 1000
max_height = 1000

[opener]
edit = [
    { run = '${EDITOR:-nvim} "$@"', desc = "$EDITOR", block = true, for = "unix" },
]
open = [
    { run = 'xdg-open "$1"', desc = "Open", for = "linux" },
]
play = [
    { run = 'xdg-open "$1"', desc = "Play", for = "linux", orphan = true },
    { run = 'mediainfo "$1"; echo "Press enter to exit"; read', desc = "Media info", block = true, for = "unix" },
]
reveal = [
    { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal in folder", for = "linux" },
    { run = 'exiftool "$1"; echo "Press enter to exit"; read', desc = "Show EXIF", block = true, for = "unix" },
]
extract = [
    { run = 'ya pub extract --list "$@"', desc = "Extract here" },
]

[open]
rules = [
    # Folder
    { mime = "inode/directory", use = [ "edit", "open", "reveal" ] },

    # HTML - edit or open in browser
    { mime = "text/html", use = [ "edit", "open", "reveal" ] },

    # Text/code files
    { mime = "text/*", use = [ "edit", "reveal" ] },
    { mime = "application/{json,ndjson,javascript,x-shellscript}", use = [ "edit", "reveal" ] },
    { mime = "inode/empty", use = [ "edit", "reveal" ] },

    # Images
    { mime = "image/*", use = [ "open", "reveal" ] },

    # Audio/Video
    { mime = "{audio,video}/*", use = [ "play", "reveal" ] },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio}", use = [ "extract", "reveal" ] },

    # PDF
    { mime = "application/pdf", use = [ "open", "reveal" ] },

    # Fallback - open with xdg-open
    { url = "*", use = [ "open", "reveal" ] },
]
